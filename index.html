<title>คำสุข บัญชี — KUMSUK</title>
<style>
:root{
  --brand:#e2001a; --brand-dark:#c00016; --brand-soft:#fdecee; --brand-ink:#a30012;
  --accent:#ffc107; --accent-soft:#fff6da; --accent-ink:#8a6100;
  --nav:#ffffff; --nav-ink:#1a1a1e;
  --bg:#f6f6f7; --surface:#ffffff; --ink:#1a1a1e; --ink-2:#63636b; --ink-3:#9b9ba3;
  --line:#ececef; --line-2:#dcdce1;
  --good:#0b8043; --good-soft:#e6f4ec; --warn:#9a6700; --warn-soft:#fff4d6; --bad:#d3222f; --bad-soft:#fdecee;
  --chart-in:#18a34a; --chart-out:#e5484d;
  --c1:#2a78d6; --c2:#18a34a; --c3:#e87ba4; --c4:#eda100; --c5:#1baf7a; --c6:#eb6834; --c7:#6a5ae0; --c8:#898781;
  --radius:16px; --shadow:0 1px 2px rgba(16,16,20,.04), 0 8px 24px rgba(16,16,20,.05);
  color-scheme:light;
}
@media (prefers-color-scheme: dark){
  :root:where(:not([data-theme="light"])){
    color-scheme:dark;
    --brand:#ff4d5e; --brand-dark:#ff6b78; --brand-soft:#38151a; --brand-ink:#ffb3ba;
    --accent:#ffc107; --accent-soft:#37300f; --accent-ink:#ffd34d;
    --nav:#1a1a1e; --nav-ink:#ececf0;
    --bg:#0f0f11; --surface:#1a1a1e; --ink:#f0f0f3; --ink-2:#a8a8b1; --ink-3:#77777f;
    --line:#2a2a2f; --line-2:#3a3a40;
    --good:#34c073; --good-soft:#122d1e; --warn:#eeb04b; --warn-soft:#352a0e; --bad:#ff6b78; --bad-soft:#38151a;
    --chart-in:#2fbf5f; --chart-out:#ff6b6b;
    --c1:#3987e5; --c2:#2fbf5f; --c3:#d55181; --c4:#c98500; --c5:#199e70; --c6:#d95926; --c7:#9085e9; --c8:#898781;
    --shadow:0 1px 3px rgba(0,0,0,.35), 0 8px 24px rgba(0,0,0,.3);
  }
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --brand:#ff4d5e; --brand-dark:#ff6b78; --brand-soft:#38151a; --brand-ink:#ffb3ba;
  --accent:#ffc107; --accent-soft:#37300f; --accent-ink:#ffd34d;
  --nav:#1a1a1e; --nav-ink:#ececf0;
  --bg:#0f0f11; --surface:#1a1a1e; --ink:#f0f0f3; --ink-2:#a8a8b1; --ink-3:#77777f;
  --line:#2a2a2f; --line-2:#3a3a40;
  --good:#34c073; --good-soft:#122d1e; --warn:#eeb04b; --warn-soft:#352a0e; --bad:#ff6b78; --bad-soft:#38151a;
  --chart-in:#2fbf5f; --chart-out:#ff6b6b;
  --c1:#3987e5; --c2:#2fbf5f; --c3:#d55181; --c4:#c98500; --c5:#199e70; --c6:#d95926; --c7:#9085e9; --c8:#898781;
  --shadow:0 1px 3px rgba(0,0,0,.35), 0 8px 24px rgba(0,0,0,.3);
}
:root[data-theme="light"]{
  color-scheme:light;
  --brand:#e2001a; --brand-dark:#c00016; --brand-soft:#fdecee; --brand-ink:#a30012;
  --accent:#ffc107; --accent-soft:#fff6da; --accent-ink:#8a6100;
  --nav:#ffffff; --nav-ink:#1a1a1e;
  --bg:#f6f6f7; --surface:#ffffff; --ink:#1a1a1e; --ink-2:#63636b; --ink-3:#9b9ba3;
  --line:#ececef; --line-2:#dcdce1;
  --good:#0b8043; --good-soft:#e6f4ec; --warn:#9a6700; --warn-soft:#fff4d6; --bad:#d3222f; --bad-soft:#fdecee;
  --chart-in:#18a34a; --chart-out:#e5484d;
  --c1:#2a78d6; --c2:#18a34a; --c3:#e87ba4; --c4:#eda100; --c5:#1baf7a; --c6:#eb6834; --c7:#6a5ae0; --c8:#898781;
  --shadow:0 1px 2px rgba(16,16,20,.04), 0 8px 24px rgba(16,16,20,.05);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Sukhumvit Set","Noto Sans Thai","Segoe UI",Thonburi,sans-serif;
  background:var(--bg); color:var(--ink); font-size:15.5px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit; font-size:inherit; cursor:pointer}
input,select,textarea{
  font-family:inherit; font-size:16px; color:var(--ink);
  background:var(--surface); border:1.5px solid var(--line-2); border-radius:10px;
  padding:9px 12px; width:100%;
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brand); outline-offset:1px; border-color:var(--brand)}
label{display:block; font-size:13px; font-weight:600; color:var(--ink-2); margin:12px 0 4px}
.num{font-variant-numeric:tabular-nums}

/* ---------- layout ---------- */
.app{display:flex; min-height:100vh}
.sidebar{
  display:none; width:236px; flex-shrink:0; background:var(--nav); color:var(--nav-ink);
  flex-direction:column; padding:24px 14px; position:sticky; top:0; height:100vh;
  border-right:1px solid var(--line);
}
.main{flex:1; min-width:0; padding:0 16px 130px; max-width:980px; margin:0 auto}
@media(min-width:900px){
  .app{gap:0}
  .sidebar{display:flex}
  .main{padding:0 34px 40px}
  .bottomnav{display:none!important}
  .mobiletop{display:none!important}
}
.brandrow{display:flex; align-items:center; gap:11px; padding:4px 10px 22px}
.brandrow .word{line-height:1.1}
.brandrow .word b{font-size:20px; letter-spacing:1px; display:block; color:var(--brand)}
.brandrow .word span{font-size:12.5px; color:var(--ink-3)}
.navbtn{
  display:flex; align-items:center; gap:11px; width:100%; text-align:left;
  background:none; border:none; color:var(--ink-2); padding:11px 13px;
  border-radius:12px; font-size:14.5px; font-weight:600; margin-bottom:2px;
}
.navbtn svg{flex-shrink:0}
.navbtn:hover{background:var(--bg); color:var(--ink)}
.navbtn.on{background:var(--brand-soft); color:var(--brand)}
.sidebar .foot{margin-top:auto; font-size:11.5px; color:var(--ink-3); padding:0 12px}

.mobiletop{
  position:sticky; top:0; z-index:30; color:var(--ink);
  background:var(--surface);
  display:flex; align-items:center; gap:10px; padding:13px 18px; margin:0 -16px 16px;
  border-bottom:1px solid var(--line);
}
.mobiletop b{font-size:16.5px; letter-spacing:.8px; color:var(--brand)}
.mobiletop span{font-size:12.5px; color:var(--ink-3)}

.bottomnav{
  position:fixed; bottom:calc(10px + env(safe-area-inset-bottom)); left:12px; right:12px; z-index:30;
  background:var(--nav); border:1px solid var(--line); border-radius:24px;
  box-shadow:0 10px 30px rgba(16,16,20,.14);
  display:flex; padding:6px 7px; max-width:560px; margin:0 auto;
}
.bottomnav button{
  flex:1; background:none; border:none; color:var(--ink-3);
  display:flex; flex-direction:column; align-items:center; gap:2px;
  font-size:10px; font-weight:600; padding:7px 0 5px; border-radius:16px;
}
.bottomnav button.on{background:var(--brand-soft); color:var(--brand)}

h1.page{font-size:23px; font-weight:800; margin:20px 0 4px; text-wrap:balance}
@media(min-width:900px){ h1.page{margin-top:30px} }
.sub{color:var(--ink-2); font-size:13.5px; margin:0 0 16px}

/* ---------- components ---------- */
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px 20px; margin-bottom:14px}
.card h3{margin:0 0 10px; font-size:15px; font-weight:700}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:12px}
@media(max-width:560px){ .grid3{grid-template-columns:1fr 1fr} .grid3 .span2m{grid-column:1/-1} }
.tile{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:15px 17px}
.tile .t{font-size:12.5px; font-weight:600; color:var(--ink-2)}
.tile .v{font-size:22px; font-weight:800; margin-top:2px; letter-spacing:-.3px}
.tile .s{font-size:12px; color:var(--ink-3); margin-top:2px}
.tile.in .v{color:var(--good)} .tile.out .v{color:var(--bad)}
.chips{display:flex; gap:8px; flex-wrap:wrap; margin:0 0 14px}
.chip{

}
.chip.on{background:var(--ink); border-color:var(--ink); color:var(--surface)}
.btn{
  background:var(--brand); color:#fff; border:none; border-radius:12px;
  padding:10px 18px; font-weight:700; font-size:14.5px;
  display:inline-flex; align-items:center; gap:7px;
}
.btn:hover{background:var(--brand-dark)}
.btn.ghost{background:var(--surface); color:var(--brand); border:1.5px solid var(--brand)}
.btn.ghost:hover{background:var(--brand-soft)}
.btn.plain{background:var(--surface); color:var(--ink-2); border:1.5px solid var(--line-2)}
.btn.plain:hover{background:var(--bg)}
.btn.sm{padding:6px 14px; font-size:13px}
.btn.danger{background:var(--surface); color:var(--bad); border:1.5px solid var(--bad)}
.btn.danger:hover{background:var(--bad-soft)}
.row{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.spread{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap}
.badge{display:inline-block; font-size:11.5px; font-weight:700; border-radius:99px; padding:2px 10px}
.badge.good{background:var(--good-soft); color:var(--good)}
.badge.warn{background:var(--warn-soft); color:var(--warn)}
.badge.bad{background:var(--bad-soft); color:var(--bad)}
.badge.mute{background:var(--bg); color:var(--ink-2); border:1px solid var(--line)}

.list{margin:0; padding:0; list-style:none}
.list li{display:flex; align-items:center; gap:12px; padding:11px 2px; border-bottom:1px solid var(--line)}
.list li:last-child{border-bottom:none}
.list .grow{flex:1; min-width:0}
.list .name{font-weight:600; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.list .meta{font-size:12.5px; color:var(--ink-3)}
.amt{font-weight:800; font-size:15px; white-space:nowrap}
.amt.in{color:var(--good)} .amt.out{color:var(--bad)}
.iconbtn{background:none; border:none; color:var(--ink-3); padding:6px; border-radius:8px; line-height:0}
.iconbtn:hover{background:var(--bg); color:var(--ink)}
.dot{width:10px; height:10px; border-radius:3px; flex-shrink:0}
.txico{
  width:38px; height:38px; border-radius:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800;
}
.txico.in{background:var(--good-soft); color:var(--good)}
.txico.out{background:var(--bad-soft); color:var(--bad)}
.empty{text-align:center; color:var(--ink-3); padding:34px 10px; font-size:14px}
.empty .big{font-size:34px; margin-bottom:6px}

.fab{
  position:fixed; right:18px; bottom:calc(84px + env(safe-area-inset-bottom)); z-index:25;
  width:56px; height:56px; border-radius:50%; border:none; background:var(--brand); color:#fff;
  font-size:28px; box-shadow:0 6px 18px rgba(226,0,26,.4); display:flex; align-items:center; justify-content:center;
}
@media(min-width:900px){ .fab{display:none} }

/* modal */
.overlay{
  position:fixed; inset:0; z-index:50; background:rgba(30,10,12,.45);
  display:flex; align-items:flex-end; justify-content:center; padding:0;
}
@media(min-width:640px){ .overlay{align-items:center; padding:24px} }
.modal{
  background:var(--surface); width:100%; max-width:560px; max-height:92vh; overflow:auto;
  border-radius:20px 20px 0 0; padding:20px 20px 26px;
}
@media(min-width:640px){ .modal{border-radius:18px} }
.modal.wide{max-width:760px}
.modal h2{margin:0 0 6px; font-size:18px; font-weight:800}
.modal .x{position:sticky; float:right; top:0; background:var(--bg); border:none; border-radius:50%; width:32px; height:32px; font-size:16px; color:var(--ink-2)}
.mact{display:flex; gap:10px; margin-top:20px; justify-content:flex-end; flex-wrap:wrap}

.toast{
  position:fixed; left:50%; transform:translateX(-50%); bottom:calc(78px + env(safe-area-inset-bottom));
  background:var(--ink); color:var(--bg); font-weight:600; font-size:14px;

  animation:toastin .25s ease;
}
@media(min-width:900px){ .toast{bottom:30px} }
@keyframes toastin{from{opacity:0; transform:translateX(-50%) translateY(8px)}to{opacity:1; transform:translateX(-50%) translateY(0)}}
@media (prefers-reduced-motion: reduce){ .toast{animation:none} }

/* table */
.tbl{width:100%; border-collapse:collapse; font-size:14px}
.tbl th{font-size:12px; color:var(--ink-2); text-align:left; padding:7px 8px; border-bottom:1.5px solid var(--line-2); font-weight:700}
.tbl td{padding:9px 8px; border-bottom:1px solid var(--line); vertical-align:top}
.tbl .r{text-align:right}
.tblwrap{overflow-x:auto}

/* chart */
.chartbox svg{width:100%; height:auto; display:block}
.legend{display:flex; gap:16px; flex-wrap:wrap; font-size:12.5px; color:var(--ink-2); margin-top:6px}
.legend .it{display:flex; align-items:center; gap:6px}
#tip{
  position:fixed; z-index:70; pointer-events:none; display:none;
  background:var(--ink); color:var(--bg); font-size:12.5px; font-weight:600;
  padding:6px 10px; border-radius:8px; white-space:nowrap;
}
.donutrow{display:flex; gap:20px; align-items:center; flex-wrap:wrap}
.donutrow .dchart{width:150px; flex-shrink:0; margin:0 auto}
.donutrow .dlegend{flex:1; min-width:200px}
.dlegend .drow{display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13.5px}
.dlegend .drow .lbl{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.dlegend .drow .val{font-weight:700}
.bar-outer{height:7px; background:var(--bg); border:1px solid var(--line); border-radius:99px; overflow:hidden; margin-top:6px}
.bar-inner{height:100%; background:var(--good); border-radius:99px}

/* ---------- print document ---------- */
#printArea{display:none}
.doc-sheet{
  background:#fff; color:#1a1a1a; max-width:730px; margin:0 auto; padding:34px 38px;
  font-size:13.5px; line-height:1.5; border-radius:8px;
}
.doc-sheet .dochead{display:flex; justify-content:space-between; gap:18px; align-items:flex-start; border-bottom:3px solid #e2001a; padding-bottom:14px}
.doc-sheet .biz b{font-size:17px}
.doc-sheet .doctitle{text-align:right}
.doc-sheet .doctitle .tt{font-size:20px; font-weight:800; color:#e2001a}
.doc-sheet .cust{display:flex; justify-content:space-between; gap:18px; margin:14px 0; flex-wrap:wrap}
.doc-sheet table{width:100%; border-collapse:collapse; margin:6px 0 12px; font-size:13px}
.doc-sheet th{background:#fdeaec; color:#8f0011; padding:7px 8px; text-align:left; font-size:12px}
.doc-sheet td{padding:7px 8px; border-bottom:1px solid #eee}
.doc-sheet .r{text-align:right}
.doc-sheet .totals{margin-left:auto; width:250px}
.doc-sheet .totals .trow{display:flex; justify-content:space-between; padding:3px 0}
.doc-sheet .totals .grand{border-top:2px solid #e2001a; margin-top:5px; padding-top:6px; font-weight:800; font-size:15px}
.doc-sheet .signs{display:flex; justify-content:space-between; gap:20px; margin-top:44px; text-align:center; font-size:12.5px; color:#555}

  body{background:#fff}
  .app,.bottomnav,.fab,.overlay,.toast,#tip{display:none!important}
  #printArea{display:block}
  .doc-sheet{max-width:none; border-radius:0; padding:10mm 8mm}

<script>
(function(){
"use strict";
/* ================= state ================= */
const KEY='kumsuk_books_v1';
const blank=()=>({
  settings:{bizName:'คำสุข KUMSUK', address:'', taxId:'', phone:'', email:'', docNote:'ขอบคุณที่ใช้บริการ', vatRate:7},
  accounts:[{id:'cash',name:'เงินสด',opening:0},{id:'bank',name:'บัญชีธนาคาร',opening:0}],
  tx:[], debts:[], products:[], docs:[], claims:[], counters:{qt:0,bl:0,iv:0,rc:0,cl:0},
  mats:[], purchases:[], preps:[], recipes:[], batches:[], matAdjs:[], users:[]
});
let S=load();
function normalize(d){
  return Object.assign(blank(), d, {settings:Object.assign(blank().settings, d.settings||{}), counters:Object.assign(blank().counters, d.counters||{})});
}
function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(!raw) return blank();
    return normalize(JSON.parse(raw));
  }catch(e){ return blank(); }
}
function save(){
  S.savedAt=new Date().toISOString();
  try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){ toast('พื้นที่จัดเก็บเต็ม! ลองลบไฟล์แนบเก่าออกบ้าง'); }
  scheduleSyncWrite();
  scheduleCloudPush();
}

/* ================= sync (iCloud file) ================= */
const SYNC={supported:('showSaveFilePicker' in window), handle:null, status:'off', fileName:'', lastSync:null, busy:false};
function idb(){ return new Promise((res,rej)=>{ const q=indexedDB.open('kumsuk_sync',1);
  q.onupgradeneeded=()=>q.result.createObjectStore('kv'); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); }
function idbSet(k,v){ return idb().then(db=>new Promise((res,rej)=>{ const t=db.transaction('kv','readwrite');
  t.objectStore('kv').put(v,k); t.oncomplete=res; t.onerror=()=>rej(t.error); })); }
function idbGet(k){ return idb().then(db=>new Promise((res,rej)=>{ const q=db.transaction('kv').objectStore('kv').get(k);
  q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); })); }
function idbDel(k){ return idb().then(db=>new Promise((res,rej)=>{ const t=db.transaction('kv','readwrite');
  t.objectStore('kv').delete(k); t.oncomplete=res; t.onerror=()=>rej(t.error); })); }

async function initSync(){
  if(!SYNC.supported) return;
  try{
    const h=await idbGet('file'); if(!h) return;
    SYNC.handle=h; SYNC.fileName=h.name;
    const perm=h.queryPermission ? await h.queryPermission({mode:'readwrite'}) : 'prompt';
    if(perm==='granted'){ await syncNow(true); }
    else { SYNC.status='need'; render(); }
  }catch(e){}
}
async function connectSync(){
  if(!SYNC.handle) return;
  try{
    const perm=await SYNC.handle.requestPermission({mode:'readwrite'});
    if(perm==='granted') await syncNow();
    else toast('ยังไม่ได้รับอนุญาตให้เข้าถึงไฟล์');
  }catch(e){ toast('เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง'); }
}
async function linkSyncFile(){
  try{
    const h=await showSaveFilePicker({suggestedName:'kumsuk-data.json',
      types:[{description:'KUMSUK data', accept:{'application/json':['.json']}}]});
    await idbSet('file',h);
    SYNC.handle=h; SYNC.fileName=h.name;
    let d=null;
    try{ d=JSON.parse(await (await h.getFile()).text()); }catch(e){}
    if(d && typeof d==='object' && ('tx' in d) && (d.savedAt||'')>(S.savedAt||'')){
      if(confirm('ไฟล์นี้มีข้อมูลใหม่กว่าในเครื่องนี้\n\nกด "ตกลง" เพื่อดึงข้อมูลจากไฟล์มาใช้ (แนะนำ)\nกด "ยกเลิก" เพื่อเขียนทับไฟล์ด้วยข้อมูลเครื่องนี้')){
        S=normalize(d);
        try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){}
      }
    }
    SYNC.status='on';
    await writeSyncFile();
    toast('เชื่อมไฟล์ซิงก์แล้ว ✓'); render();
  }catch(e){

let SNAPS=[];
async function dailySnapshot(){
  try{
    const d=today();
    let idx=(await idbGet('snapIndex'))||[];
    if(!idx.includes(d)){
      await idbSet('snap-'+d, JSON.stringify(S));

}

  CLOUD.access=d.access_token; if(d.refresh_token) CLOUD.refresh=d.refresh_token;

async function cloudToken(){

  if(!res.ok){ const t=await res.text().catch(()=>''); throw new Error('HTTP '+res.status+' '+t.slice(0,140)); }
  return res.status===204?null:res.json();

let AUTH=null; /* id ผู้ใช้ที่ล็อกอินอยู่ */
const AUTH_KEY='kumsuk_auth_v1';
const PERM_KEYS=[['prod','🌶️ น้ำพริก (ผลิต-สต๊อก)'],['claims','🧾 ตั้งเบิก'],['dash','📊 แดชบอร์ดเงิน'],['tx','💵 รายรับ-รายจ่าย'],['docs','📄 เอกสาร'],['debts','🤝 ลูกหนี้-เจ้าหนี้'],['set','⚙️ ตั้งค่า / จัดการผู้ใช้และระบบ']];
async function hashPass(p){
  try{
    const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode('kumsuk|'+p));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    let h=5381; const s='kumsuk|'+p;
    for(let i=0;i<s.length;i++){ h=((h<<5)+h+s.charCodeAt(i))>>>0; }
    return 'x'+h.toString(16);
  }
}
function curUser(){ return S.users.find(u=>u.id===AUTH); }
function hasPerm(k){
  const u=curUser(); if(!u) return false;
  if(u.role&&u.role!=='staff') return true; /* ผู้ใช้รุ่นเก่าแบบ "หัวหน้า" = เข้าได้หมด */
  return (u.perms||[]).includes(k);
}
function userFull(u){ return (u.role&&u.role!=='staff')||((u.perms||[]).includes('set')); }
function acctPerms(){ return ['dash','tx','docs','claims','debts'].filter(hasPerm); }
function initAuth(){
  try{
    const raw=sessionStorage.getItem(AUTH_KEY);
    if(!raw) return;
    const t=JSON.parse(raw);
    const u=S.users.find(x=>x.id===t.uid);
    if(u&&u.pass===t.h) AUTH=u.id;
  }catch(e){}
}

async function setupSubmit(e){
  e.preventDefault(); const f=e.target;
  const p1=f.pass.value,p2=f.pass2.value;
  if(p1.length<4){ toast('รหัสผ่านอย่างน้อย 4 ตัว'); return false; }
  if(p1!==p2){ toast('รหัสผ่านไม่ตรงกัน'); return false; }
  const h=await hashPass(p1);
  const u={id:uid(),name:f.name.value.trim()||'เจ้าของร้าน',pass:h,perms:PERM_KEYS.map(p=>p[0]),title:''};
  S.users.push(u); save();
  AUTH=u.id;
  try{ sessionStorage.setItem(AUTH_KEY,JSON.stringify({uid:u.id,h})); }catch(e2){}
  toast('ยินดีต้อนรับ '+u.name+' 🙂'); render(); return false;
}
async function loginSubmit(e){
  e.preventDefault(); const f=e.target;
  const u=S.users.find(x=>x.id===f.uid.value);
  const h=await hashPass(f.pass.value);
  if(!u||u.pass!==h){ toast('รหัสผ่านไม่ถูกต้อง'); return false; }
  AUTH=u.id;
  try{ sessionStorage.setItem(AUTH_KEY,JSON.stringify({uid:u.id,h})); }catch(e2){}
  toast('สวัสดี '+u.name+' 🙂'); render(); return false;
}
function logout(){
  if(!confirm('ออกจากระบบ?')) return;
  AUTH=null; MODE=null;
  try{ sessionStorage.removeItem(AUTH_KEY); }catch(e){}
  render();
}
function permAll(btn){

  const all=[...boxes].every(b=>b.checked);
  boxes.forEach(b=>{ b.checked=!all; });
}

async function saveUser(e,id){
  e.preventDefault(); const f=e.target;
  const perms=[...f.querySelectorAll('input[name="perm"]:checked')].map(c=>c.value);
  if(!perms.length){ toast('ติ๊กอย่างน้อย 1 ส่วน'); return false; }
  if(id&&!perms.includes('set')){
    const u0=S.users.find(x=>x.id===id);
    if(u0&&userFull(u0)&&!S.users.some(x=>x.id!==id&&userFull(x))){ toast('ต้องมีอย่างน้อย 1 คนที่เข้าหน้า "ตั้งค่า" ได้'); return false; }
  }
  const p1=f.pass.value,p2=f.pass2.value;
  if(!id||p1){
    if(p1.length<4){ toast('รหัสผ่านอย่างน้อย 4 ตัว'); return false; }
    if(p1!==p2){ toast('รหัสผ่านไม่ตรงกัน'); return false; }
  }
  if(id){
    const u=S.users.find(x=>x.id===id);
    u.name=f.name.value.trim()||u.name; u.perms=perms; u.title=f.title.value.trim();
    delete u.role;
    if(p1){ u.pass=await hashPass(p1);
      if(id===AUTH){ try{ sessionStorage.setItem(AUTH_KEY,JSON.stringify({uid:id,h:u.pass})); }catch(e2){} }
    }
  }else{
    S.users.push({id:uid(),name:f.name.value.trim()||'ผู้ใช้',pass:await hashPass(p1),perms,title:f.title.value.trim()});
  }
  save(); closeModal(); toast('บันทึกผู้ใช้แล้ว ✓'); render(); return false;
}
function delUser(id){
  const u=S.users.find(x=>x.id===id); if(!u) return;
  if(id===AUTH){ toast('ลบผู้ใช้ที่กำลังใช้งานอยู่ไม่ได้'); return; }
  if(userFull(u)&&!S.users.some(x=>x.id!==id&&userFull(x))){ toast('ต้องมีอย่างน้อย 1 คนที่เข้าหน้า "ตั้งค่า" ได้'); return; }
  if(!confirm('ลบผู้ใช้ "'+u.name+'"?')) return;
  S.users=S.users.filter(x=>x.id!==id); save(); toast('ลบแล้ว'); render();
}

/* ================= dashboard ================= */
function last6Months(){
  const out=[]; const d=new Date();
  for(let i=5;i>=0;i--){ const x=new Date(d.getFullYear(), d.getMonth()-i, 1);
    out.push(x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')); }
  return out;
}
function renderDash(){
  const list=S.tx, ym=curMonth();
  const inc=sumTx(list,'in',ym), exp=sumTx(list,'out',ym);
  const bals=S.accounts.map(a=>({a,b:acctBal(a)}));
  const totalBal=bals.reduce((s,x)=>s+x.b,0);
  const pendCl=S.claims.filter(c=>c.status==='pending');
  const apprCl=S.claims.filter(c=>c.status==='approved');
  const clSum=pendCl.concat(apprCl).reduce((s,c)=>s+(+c.amount||0),0);
  const arLeft=S.debts.filter(d=>d.kind==='ar').reduce((a,d)=>a+debtLeft(d),0);
  const apLeft=S.debts.filter(d=>d.kind==='ap').reduce((a,d)=>a+debtLeft(d),0);
  const mc=matCalc();
  const stockVal=S.products.reduce((a,p)=>a+(+p.qty||0)*(+p.cost||0),0)+mc.val;
  const lows=S.products.filter(p=>p.low!=null&&p.low!==''&&(+p.qty||0)<=+p.low)
    .map(p=>({name:p.name,qty:p.qty,unit:p.unit,low:p.low}))
    .concat(S.mats.filter(x=>{ const q=(mc.m[x.id]||{qty:0}).qty; return x.low!=null&&x.low!==''&&q<=+x.low; })
    .map(x=>({name:x.name+' (วัตถุดิบ)',qty:(mc.m[x.id]||{qty:0}).qty,unit:x.unit,low:x.low})));
  const unpaidDocs=S.docs.filter(d=>d.type!=='qt'&&!d.paid);

  /* bar chart */
  const months=last6Months();
  const data=months.map(m=>({m, i:sumTx(list,'in',m), o:sumTx(list,'out',m)}));
  const maxV=Math.max(1,...data.map(d=>Math.max(d.i,d.o)));
  const W=640,H=240,P={l:44,r:8,t:14,b:26}, cw=(W-P.l-P.r)/6;
  let bars='';
  const steps=4;
  for(let s=0;s<=steps;s++){ const y=P.t+(H-P.t-P.b)*s/steps; const v=maxV*(1-s/steps);
    bars+='<line x1="'+P.l+'" y1="'+y+'" x2="'+(W-P.r)+'" y2="'+y+'" stroke="var(--line)" stroke-width="1"/>'
        +'<text x="'+(P.l-6)+'" y="'+(y+4)+'" text-anchor="end" font-size="10.5" fill="var(--ink-3)">'+kfmt(v)+'</text>'; }
  data.forEach((d,i)=>{
    const cx=P.l+cw*i+cw/2, bw=Math.min(24,cw/2-6);
    [['i','var(--chart-in)','รายรับ'],['o','var(--chart-out)','รายจ่าย']].forEach((k,j)=>{

    +'<div style="position:relative">'

function pickType(btn){
  const box=btn.parentElement; box.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); btn.classList.add('on');

function saveTx(e,id){
  e.preventDefault(); const f=e.target;
  const rec={ id:id||uid(), type:f.type.value, amount:+f.amount.value||0, date:f.date.value,
    cat:f.cat.value, acct:f.acct.value, note:f.note.value.trim() };
  if(id){ const i=S.tx.findIndex(x=>x.id===id); S.tx[i]=rec; } else S.tx.push(rec);
  save(); closeModal(); toast('บันทึกแล้ว ✓'); render(); return false;

    const left=debtLeft(d), paid=(+d.total||0)-left, pct=d.total>0?Math.min(100,paid/d.total*100):0;

      +'<div style="text-align:right"><div class="amt num" style="color:'+(left>0?'var(--bad)':'var(--good)')+'">'+(left>0?baht(left):'ครบแล้ว ✓')+'</div>'

      +'<button class="iconbtn" onclick="App.debtForm(null,\''+d.id+'\')" title="แก้ไข">'+IC.edit+'</button>'

function savePay(e,id){
  e.preventDefault(); const f=e.target; const d=S.debts.find(x=>x.id===id);
  const amt=+f.amount.value||0;

      note:(d.kind==='ar'?'รับชำระหนี้จาก ':'ชำระหนี้ให้ ')+d.name});

/* ---- เครื่องคิดต้นทุนวัตถุดิบแบบถัวเฉลี่ยเคลื่อนที่ (replay เหตุการณ์ตามวันที่) ---- */
function matCalc(){
  const evs=[];
  S.purchases.forEach(r=>evs.push({d:r.date,ts:r.ts||0,k:'pu',r}));
  S.preps.forEach(r=>evs.push({d:r.date,ts:r.ts||0,k:'pr',r}));
  S.batches.forEach(r=>evs.push({d:r.date,ts:r.ts||0,k:'ba',r}));
  S.matAdjs.forEach(r=>evs.push({d:r.date,ts:r.ts||0,k:'ad',r}));
  evs.sort((a,b)=> a.d<b.d?-1:a.d>b.d?1:(a.ts-b.ts));
  const m={};
  const st=id=>m[id]||(m[id]={qty:0,avg:0});
  const add=(s,q,c)=>{ if(q<=0)return; const b=Math.max(s.qty,0), n=b+q; s.avg=n>0?(b*s.avg+c)/n:s.avg; s.qty+=q; };
  for(const e of evs){ const r=e.r;
    if(e.k==='pu') add(st(r.matId), +r.qty||0, +r.total||0);
    else if(e.k==='pr'){ const f=st(r.fromId); const ci=(+r.qtyIn||0)*f.avg; f.qty-=(+r.qtyIn||0); add(st(r.toId), +r.qtyOut||0, ci); }
    else if(e.k==='ba'){ (r.lines||[]).forEach(ln=>{ st(ln.matId).qty-=(+ln.qty||0); }); }
    else if(e.k==='ad'){ st(r.matId).qty=+r.newQty||0; }
  }
  let val=0; Object.keys(m).forEach(id=>{ val+=Math.max(m[id].qty,0)*m[id].avg; });
  return {m,val};
}

  if(dir==='in'){ p.qty=(+p.qty||0)+q; if(pu>0) p.cost=pu;

    if(f.logtx.checked&&q*pu>0) S.tx.push({id:uid(),type:'in',amount:q*pu,date:f.date.value,cat:'ขายสินค้า',acct:f.acct.value,note:'ขาย '+p.name+' x'+fmt0(q)});

  e.preventDefault(); const f=e.target;
  const p=S.products.find(x=>x.id===f.productId.value);
  if(!p){ toast('เลือกสินค้าที่ได้จากการผลิต'); return false; }
  const mm=matCalc().m;
  let matCost=0;
  const lines=BA.lines.filter(l=>l.matId&&+l.qty>0).map(l=>{
    const avg=(mm[l.matId]||{avg:0}).avg, cost=avg*+l.qty; matCost+=cost;
    return {matId:l.matId,qty:+l.qty,unitCost:avg,cost};
  });
  if(!lines.length){ toast('ใส่วัตถุดิบที่ใช้อย่างน้อย 1 รายการ'); return false; }
  const extras=BA.extras.filter(x=>x.name||+x.amount).map(x=>({name:x.name||'ค่าอื่นๆ',amount:+x.amount||0}));
  const extraCost=extras.reduce((s,x)=>s+x.amount,0);
  const out=+f.outputQty.value||0;
  const total=matCost+extraCost, cpu=out>0?total/out:0;
  const baseQty=Math.max(+p.qty||0,0), newQty=baseQty+out;
  if(newQty>0) p.cost=(baseQty*(+p.cost||0)+total)/newQty;
  p.qty=(+p.qty||0)+out;
  S.batches.push({id:uid(),ts:Date.now(),date:f.date.value,name:f.name.value.trim()||'รอบผลิต',recipeId:BA.recipeId||'',
    productId:p.id,lines,extras,outputQty:out,note:'',calc:{matCost,extraCost,total,costPerUnit:cpu}});
  save(); closeModal(); toast('บันทึกแล้ว ✓ ต้นทุน '+baht(cpu)+'/หน่วย'); render(); return false;
}
function delBa(id){
  const b=S.batches.find(x=>x.id===id); if(!b) return;
  if(!confirm('ลบรอบผลิตนี้? วัตถุดิบจะถูกคืนเข้าสต๊อก และสินค้า '+fmt0(b.outputQty)+' หน่วยจะถูกหักออก')) return;
  const p=S.products.find(x=>x.id===b.productId);
  if(p) p.qty=(+p.qty||0)-b.outputQty;
  S.batches=S.batches.filter(x=>x.id!==id);
  save(); toast('ลบแล้ว'); render();
}

/* ---- นำเข้าข้อมูลจากแอปน้ำพริก ---- */
function importNamprik(inp){
  const file=inp.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d||typeof d!=='object'||!Array.isArray(d.ingredients)) throw 0;
      const keys=['ingredients','products','purchases','preps','recipes','batches','sales','expenses','payments','adjustments'];
      const cnt=keys.reduce((s,k)=>s+((d[k]||[]).length),0);
      if(!confirm('พบข้อมูลจากแอปน้ำพริก '+cnt+' รายการ\n\n• วัตถุดิบ สูตร รอบผลิต จะแทนที่ข้อมูลผลิตเดิมทั้งหมด\n• สินค้าจะถูกเพิ่ม/อัปเดตตามไฟล์\n• ยอดขาย ค่าใช้จ่าย ค่าซื้อวัตถุดิบ จะบันทึกเป็นรายรับ-รายจ่าย (ลงบัญชีเงินบัญชีแรก)\n• บิลเชื่อจะตั้งเป็นลูกหนี้/เจ้าหนี้ให้\n\nแนะนำให้ส่งออกข้อมูลสำรองของแอปนี้ก่อน — ดำเนินการต่อ?')) return;
      const acct=S.accounts[0].id;
      S.mats=(d.ingredients||[]).map(i=>({id:i.id,name:i.name,unit:i.unit||'',low:i.minStock==null?null:+i.minStock,note:i.note||''}));
      S.purchases=(d.purchases||[]).map(x=>({id:x.id,ts:x.ts||0,date:x.date,matId:x.ingredientId,qty:+x.qty||0,total:+x.totalPrice||0,supplier:x.supplier||'',note:x.note||'',credit:!!x.credit}));
      S.preps=(d.preps||[]).map(x=>({id:x.id,ts:x.ts||0,date:x.date,fromId:x.fromId,qtyIn:+x.qtyIn||0,toId:x.toId,qtyOut:+x.qtyOut||0,note:x.note||''}));
      S.matAdjs=(d.adjustments||[]).filter(a=>a.itemType==='ingredient').map(a=>({id:a.id,ts:a.ts||0,date:a.date,matId:a.itemId,newQty:+a.newQty||0}));
      S.recipes=(d.recipes||[]).map(rc=>({id:rc.id,name:rc.name,productId:rc.productId,
        lines:(rc.lines||[]).map(l=>({matId:l.ingredientId,qty:+l.qty||0})),
        extras:(rc.extraCosts||[]).map(x=>({name:x.name,amount:+x.amount||0})),
        expectedOutput:+rc.expectedOutput||0,note:rc.note||''}));
      S.batches=(d.batches||[]).map(b=>({id:b.id,ts:b.ts||0,date:b.date,name:b.name||'รอบผลิต',recipeId:b.recipeId||'',productId:b.productId,
        lines:(b.lines||[]).map(l=>({matId:l.ingredientId,qty:+l.actualQty||0,unitCost:0,cost:0})),
        extras:(b.extraCosts||[]).map(x=>({name:x.name,amount:+x.amount||0})),
        outputQty:+b.outputQty||0,note:b.note||'',calc:{matCost:0,extraCost:0,total:0,costPerUnit:0}}));
      (d.products||[]).forEach(p=>{
        let ex=S.products.find(x=>x.id===p.id)||S.products.find(x=>x.name===p.name);
        if(!ex){ S.products.push({id:p.id,name:p.name,sku:'',unit:p.unit||'',cost:0,price:+p.sellPrice||0,qty:0,low:p.minStock==null?null:+p.minStock}); }
        else{ if(+p.sellPrice) ex.price=+p.sellPrice; if(p.minStock!=null) ex.low=+p.minStock; }
      });
      /* replay ทั้งระบบเพื่อคำนวณต้นทุนรอบผลิต + ยอดสินค้า + กำไรขาย */
      const evs=[];
      (d.purchases||[]).forEach(x=>evs.push({d:x.date,ts:x.ts||0,k:'pu',r:x}));
      (d.preps||[]).forEach(x=>evs.push({d:x.date,ts:x.ts||0,k:'pr',r:x}));
      (d.batches||[]).forEach(x=>evs.push({d:x.date,ts:x.ts||0,k:'ba',r:x}));
      (d.sales||[]).forEach(x=>evs.push({d:x.date,ts:x.ts||0,k:'sa',r:x}));
      (d.adjustments||[]).forEach(x=>evs.push({d:x.date,ts:x.ts||0,k:'ad',r:x}));
      evs.sort((a,b)=> a.d<b.d?-1:a.d>b.d?1:(a.ts-b.ts));
      const ing={},prod={};
      const st=(m,id)=>m[id]||(m[id]={qty:0,avg:0});
      const add=(s,q,c)=>{ if(q<=0)return; const b2=Math.max(s.qty,0),n=b2+q; s.avg=n>0?(b2*s.avg+c)/n:s.avg; s.qty+=q; };
      for(const e of evs){ const x=e.r;
        if(e.k==='pu') add(st(ing,x.ingredientId),+x.qty||0,+x.totalPrice||0);
        else if(e.k==='pr'){ const fr=st(ing,x.fromId); const ci=(+x.qtyIn||0)*fr.avg; fr.qty-=(+x.qtyIn||0); add(st(ing,x.toId),+x.qtyOut||0,ci); }
        else if(e.k==='ba'){
          let mc=0; const myB=S.batches.find(bb=>bb.id===x.id);
          (x.lines||[]).forEach((l,li)=>{ const s2=st(ing,l.ingredientId); const c=(+l.actualQty||0)*s2.avg; s2.qty-=(+l.actualQty||0); mc+=c;
            if(myB&&myB.lines[li]){ myB.lines[li].unitCost=s2.avg; myB.lines[li].cost=c; } });
          const exc=(x.extraCosts||[]).reduce((s,c)=>s+(+c.amount||0),0);
          add(st(prod,x.productId),+x.outputQty||0,mc+exc);
          if(myB) myB.calc={matCost:mc,extraCost:exc,total:mc+exc,costPerUnit:+x.outputQty>0?(mc+exc)/+x.outputQty:0};
        }
        else if(e.k==='sa'){ const s2=st(prod,x.productId); s2.qty-=(+x.qty||0); }
        else if(e.k==='ad'){ st(x.itemType==='ingredient'?ing:prod,x.itemId).qty=+x.newQty||0; }
      }
      S.products.forEach(p=>{ const s2=prod[p.id]; if(s2){ p.qty=s2.qty; p.cost=s2.avg; } });
      /* เงิน: ซื้อวัตถุดิบ */
      const pays=d.payments||[];
      S.purchases.forEach(x=>{
        if(x.credit){
          const paid=pays.filter(p=>p.kind==='pay'&&p.refId===x.id).map(p=>({id:p.id,date:p.date,amount:+p.amount||0}));
          const dd={id:'np-'+x.id,kind:'ap',name:x.supplier||'เจ้าหนี้ (นำเข้า)',note:'ซื้อ '+matName(x.matId)+' (นำเข้าจากแอปน้ำพริก)',total:x.total,due:'',payments:paid,createdDate:x.date};
          S.debts.push(dd); x.debtId=dd.id;
          paid.forEach(p=>S.tx.push({id:uid(),type:'out',amount:p.amount,date:p.date,cat:'ต้นทุนสินค้า/วัตถุดิบ',acct,note:'จ่ายเจ้าหนี้ '+(x.supplier||'')}));
        }else if(x.total>0){
          const tx={id:uid(),type:'out',amount:x.total,date:x.date,cat:'ต้นทุนสินค้า/วัตถุดิบ',acct,note:'ซื้อ '+matName(x.matId)+' '+fmt(x.qty)};
          S.tx.push(tx); x.txId=tx.id;
        }
      });
      /* เงิน: ขาย */
      (d.sales||[]).forEach(x=>{
        const p=S.products.find(pp=>pp.id===x.productId);
        const amt=(+x.qty||0)*(+x.unitPrice||0);
        const note='ขาย '+(p?p.name:'สินค้า')+' x'+fmt0(x.qty)+(x.customer?' ('+x.customer+')':'');
        if(x.credit){
          const paid=pays.filter(pp=>pp.kind==='receive'&&pp.refId===x.id).map(pp=>({id:pp.id,date:pp.date,amount:+pp.amount||0}));
          S.debts.push({id:'np-'+x.id,kind:'ar',name:x.customer||'ลูกหนี้ (นำเข้า)',note,total:amt,due:'',payments:paid,createdDate:x.date});
          paid.forEach(pp=>S.tx.push({id:uid(),type:'in',amount:pp.amount,date:pp.date,cat:'ขายสินค้า',acct,note:'รับชำระ '+(x.customer||'')}));
        }else if(amt>0){
          S.tx.push({id:uid(),type:'in',amount:amt,date:x.date,cat:'ขายสินค้า',acct,note});
        }
      });
      /* เงิน: ค่าใช้จ่ายร้าน */
      (d.expenses||[]).forEach(x=>{
        if(+x.amount>0) S.tx.push({id:uid(),type:'out',amount:+x.amount,date:x.date,cat:'รายจ่ายอื่นๆ',acct,note:(x.category||'ค่าใช้จ่าย')+(x.note?' — '+x.note:'')+' (นำเข้า)'});
      });
      save(); MODE='prod'; ui.view='stock'; ui.stockTab='mats';
      toast('นำเข้าข้อมูลน้ำพริกแล้ว ✓'); render();
    }catch(err){ toast('ไฟล์ไม่ถูกต้อง — ใช้ไฟล์สำรองจากแอปน้ำพริกเท่านั้น'); }
  };
  r.readAsText(file); inp.value='';
}

function fileToAttach(file,cb){
  if(file.type&&file.type.indexOf('image/')===0){
    const fr=new FileReader();
    fr.onload=()=>{ const img=new Image();
      img.onload=()=>{ const MAX=1400; let w=img.width,h=img.height;
        if(Math.max(w,h)>MAX){ const k=MAX/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
        cb({id:uid(),name:file.name,mime:'image/jpeg',data:c.toDataURL('image/jpeg',0.8)}); };
      img.src=fr.result; };
    fr.readAsDataURL(file);
  }else{
    if(file.size>2500000){ toast('ไฟล์ '+file.name+' ใหญ่เกิน 2.5MB — แนะนำถ่ายเป็นรูปภาพแทน'); return; }
    const fr=new FileReader();
    fr.onload=()=>cb({id:uid(),name:file.name,mime:file.type||'application/octet-stream',data:fr.result});
    fr.readAsDataURL(file);
  }
}
function clAddFiles(inp){

function saveAcct(e,id){
  e.preventDefault(); const f=e.target;
  if(id){ const a=S.accounts.find(x=>x.id===id); a.name=f.name.value.trim(); a.opening=+f.opening.value||0; }
  else S.accounts.push({id:uid(),name:f.name.value.trim(),opening:+f.opening.value||0});
  save(); closeModal(); toast('บันทึกแล้ว ✓'); render(); return false;
}
function delAcct(id){
  if(S.accounts.length<=1) return;
  if(!confirm('ลบบัญชีนี้? รายการเงินที่เคยผูกกับบัญชีนี้จะถูกนับรวมในบัญชีแรกแทน')) return;
  S.accounts=S.accounts.filter(x=>x.id!==id);
  if(ui.txAcct===id) ui.txAcct='all';
  save(); toast('ลบแล้ว'); render();
}

function importData(inp){
  const file=inp.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d||typeof d!=='object'||!('tx' in d)) throw 0;
      if(!confirm('นำเข้าข้อมูลจากไฟล์นี้? ข้อมูลปัจจุบันจะถูกแทนที่ทั้งหมด')) return;
      S=normalize(d);
      save(); toast('นำเข้าข้อมูลแล้ว ✓'); render();
    }catch(e){ toast('ไฟล์ไม่ถูกต้อง — ใช้ไฟล์ที่ส่งออกจากแอปนี้เท่านั้น'); }
  };
  r.readAsText(file); inp.value='';
}
function wipe(){
  if(!confirm('ลบข้อมูลทั้งหมดถาวร? แนะนำให้ส่งออกสำรองก่อน')) return;
  if(!confirm('ยืนยันอีกครั้ง: ข้อมูลจะหายทั้งหมดและกู้คืนไม่ได้')) return;
  S=blank(); save(); toast('ล้างข้อมูลแล้ว'); render();
}

/* ================= modal & misc ================= */
function openModal(title,html,wide){
  document.getElementById('modalhost').innerHTML=
  '<div class="overlay" onclick="if(event.target===this)App.closeModal()"><div class="modal'+(wide?' wide':'')+'">'
  +'<button class="x" onclick="App.closeModal()" aria-label="ปิด">✕</button><h2>'+title+'</h2>'+html+'</div></div>';
}
function closeModal(){ document.getElementById('modalhost').innerHTML=''; ED=null; EC=null; RC=null; BA=null; }
function tip(ev,text){
  const t=document.getElementById('tip'); t.textContent=text; t.style.display='block';
  const x=Math.min(ev.clientX+12, window.innerWidth-160), y=ev.clientY-34;
  t.style.left=x+'px'; t.style.top=y+'px';
}
function hideTip(){ document.getElementById('tip').style.display='none'; }
function fabClick(){
  if(ui.view==='stock'){ ({prod:prodForm, mats:puForm, recipes:rcForm, batches:baForm})[ui.stockTab](); }
  else if(ui.view==='debts') debtForm(ui.debtKind);
  else if(ui.view==='docs') docForm('rc');
  else if(ui.view==='claims') claimForm();
  else txForm();
}

/* ================= render root ================= */
function render(){
  if(AUTH&&!curUser()) AUTH=null; /* ผู้ใช้ถูกลบ/ข้อมูลเปลี่ยนจากซิงก์ */
  if(!AUTH){ renderLogin(); return; }
  if(!MODE){ renderLauncher(); return; }
  if(MODE==='prod'&&!hasPerm('prod')){ MODE=null; renderLauncher(); return; }
  if(MODE==='acct'){
    if(!acctPerms().length){ MODE=null; renderLauncher(); return; }
    if(ui.view==='set'&&!hasPerm('set')) ui.view=acctPerms()[0];
    else if(ui.view!=='set'&&ui.view!=='stock'&&!hasPerm(ui.view)) ui.view=acctPerms()[0];
  }
  document.getElementById('fab').style.display='flex';
  const mt=document.querySelector('.mobiletop'); if(mt) mt.style.display='flex';
  renderNav();
  ({dash:renderDash, tx:renderTx, docs:renderDocs, claims:renderClaims, debts:renderDebts, stock:renderStock, set:renderSet})[ui.view]();
  if(SYNC.handle&&SYNC.status==='need'&&ui.view!=='set'){
    document.getElementById('view').insertAdjacentHTML('afterbegin',
      '<div class="card" style="border-color:var(--warn);background:var(--warn-soft);margin-top:14px"><div class="spread">'
      +'<span style="font-size:13.5px;font-weight:600">🔄 กดเชื่อมต่อเพื่อซิงก์ข้อมูลกับเครื่องอื่น</span>'
      +'<button class="btn sm" onclick="App.connectSync()">เชื่อมต่อ</button></div></div>');
  }
}
